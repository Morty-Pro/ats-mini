[env:ats-mini]
platform = espressif32 ;@~6.0.0
board = esp32-s3-devkitc-1
framework = arduino

; Flash Configuration (matches esptool command)
board_upload.flash_size = 8MB
board_build.flash_mode = dio
board_build.f_cpu = 80000000L

; Upload Configuration
upload_port = COM10
upload_speed = 921600
upload_flags = 
    --flash_mode dio
    --flash_freq 80m
    --flash_size 8MB

; Serial Monitor
monitor_speed = 115200

; Build Flags
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
